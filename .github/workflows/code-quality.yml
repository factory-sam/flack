name: Code Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (includes complexity, max-lines, naming)
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests (coverage thresholds + JUnit timing report)
        run: pnpm test:ci

      - name: Upload test report (timing + flaky detection)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/junit.xml
          if-no-files-found: warn

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

      - name: Dead code and unused dependencies (knip)
        run: pnpm knip

      - name: Duplicate code (jscpd)
        run: pnpm duplication

      - name: Technical debt markers
        run: pnpm tech-debt

      - name: Validate docs (AGENTS.md/README commands + links)
        run: pnpm validate-docs

  build:
    runs-on: ubuntu-latest
    env:
      # Public, non-secret placeholders so the production build is deterministic
      # and does not depend on repository secrets (the app reads Supabase at runtime).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: build-placeholder-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        id: next-cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Cache the Next.js compiler/incremental cache so rebuilds reuse work.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', '*.ts', '*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build with metrics (incremental via restored .next/cache)
        env:
          NEXT_BUILD_CACHE_HIT: ${{ steps.next-cache.outputs.cache-hit }}
        run: pnpm build:metrics

      - name: Upload build metrics (duration + cache hit)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics
          path: reports/build-metrics.json
          if-no-files-found: warn
